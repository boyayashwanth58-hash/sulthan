<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlagiaGuard - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <!-- Background Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Main Container -->
    <div class="login-wrapper">
        <!-- Animated Boy Character -->
        <div class="boy-container" id="boyContainer">
            <svg class="boy-character" viewBox="0 0 100 200" width="120" height="240">
                <!-- Head -->
                <circle cx="50" cy="30" r="18" fill="#f5a962" stroke="#333" stroke-width="2"/>
                
                <!-- Eyes -->
                <circle cx="44" cy="25" r="3" fill="#333"/>
                <circle cx="56" cy="25" r="3" fill="#333"/>
                
                <!-- Smile -->
                <path d="M 44 32 Q 50 35 56 32" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                
                <!-- Body -->
                <rect x="40" y="50" width="20" height="30" rx="5" fill="#4f46e5" stroke="#333" stroke-width="2"/>
                
                <!-- Arms -->
                <g id="leftArm">
                    <line x1="40" y1="55" x2="25" y2="70" stroke="#f5a962" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="25" cy="70" r="6" fill="#f5a962" stroke="#333" stroke-width="1.5"/>
                </g>
                <g id="rightArm">
                    <line x1="60" y1="55" x2="75" y2="70" stroke="#f5a962" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="75" cy="70" r="6" fill="#f5a962" stroke="#333" stroke-width="1.5"/>
                </g>
                
                <!-- Legs -->
                <g id="leftLeg">
                    <line x1="45" y1="80" x2="40" y2="110" stroke="#333" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="40" cy="110" r="5" fill="#333"/>
                </g>
                <g id="rightLeg">
                    <line x1="55" y1="80" x2="60" y2="110" stroke="#333" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="60" cy="110" r="5" fill="#333"/>
                </g>
                
                <!-- Rope/Chain connecting to card -->
                <line x1="75" y1="70" x2="120" y2="50" stroke="#06b6d4" stroke-width="2" stroke-dasharray="5,5" class="rope"/>
            </svg>
        </div>

        <!-- Login Card Container -->
        <div class="card-wrapper" id="cardWrapper">
            <div class="login-card" id="loginCard">
                <!-- Logo Section -->
                <div class="logo-section">
                    <div class="logo-icon">🔍</div>
                    <h1>PlagiaGuard</h1>
                    <p class="tagline">Advanced Plagiarism Detection</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="login-form">
                    <!-- Username Input -->
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="Enter your username"
                                required
                            >
                            <span class="input-icon">👤</span>
                        </div>
                        <span class="error-message" id="usernameError"></span>
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Enter your password"
                                required
                            >
                            <span class="input-icon toggle-password" id="togglePassword">👁️</span>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <!-- Remember Me -->
                    <div class="remember-forgot">
                        <label class="remember">
                            <input type="checkbox" id="rememberMe">
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader">
                            <span></span>
                            <span></span>
                            <span></span>
                        </span>
                    </button>
                </form>

                <!-- Signup Link -->
                <div class="signup-section">
                    <p>Don't have an account? <a href="#" class="signup-link">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Background Shapes -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
